<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ml-course</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      (function() {
      // 检查是否有需要恢复的路径
      var redirectPath = sessionStorage.getItem('redirect-path');
      if (redirectPath && redirectPath !== window.location.pathname) {
        sessionStorage.removeItem('redirect-path');
        // 使用 Vue Router 跳转（通过 URL 参数触发）
        var base = '/你的仓库名/';
        var newUrl = redirectPath.startsWith(base) ? redirectPath : base + redirectPath.replace(/^\//, '');
        window.history.replaceState(null, '', newUrl);
        // 手动触发路由更新（如果 Vue 应用未启动，等待其启动）
        if (window.__vue_router_ready__) {
          window.dispatchEvent(new Event('popstate'));
        } else {
          window.addEventListener('vue-router-ready', function() {
            window.dispatchEvent(new Event('popstate'));
          });
        }
      }
    })();
  </script>
  </body>
</html>
