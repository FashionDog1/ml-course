<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
</head>
<body>
  <script>
    // 获取当前路径（例如 /ml-course/chapters/introduction）
    var path = window.location.pathname;
    // 将路径存入 sessionStorage 或 URL 参数
    sessionStorage.setItem('redirect-path', path);
    // 重定向到根目录的 index.html
    window.location.replace('/ml-course/'); 
  </script>
</body>
</html>
